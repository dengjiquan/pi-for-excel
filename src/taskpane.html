<!DOCTYPE html>
<html lang="zh-CN" style="color-scheme: light dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI for Excel</title>
  <meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#303040" media="(prefers-color-scheme: dark)" />

  <style>
    /* Minimal structural reset — theme is in src/ui/theme.css */
    /*
     * Structural layout only — NO margin/padding reset on *.
     * Tailwind v4 uses @layer; unlayered resets clobber all utilities.
     */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }

    .pi-boot-loading {
      display: grid;
      min-height: 100%;
      place-items: center;
      padding: 24px;
      color: #4b5563;
      font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <div id="error-root"></div>
  <div id="app">
    <div id="loading-root">
      <div class="pi-boot-loading">Loading AI for Excel...</div>
    </div>
  </div>

  <!-- Office.js — local dev cache avoids Office WebView startup stalls on flaky CDN/proxy paths. -->
  <script src="/vendor/office.js"></script>
  <script type="module" src="./taskpane.ts"></script>
</body>
</html>
